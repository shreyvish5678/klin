name: Bug report
description: Report a reproducible Work Distill defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Do not include secrets, private traces, or hidden labels.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      placeholder: Commands, browser, viewport, and sanitized steps
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision
      placeholder: Git commit
    validations:
      required: true
